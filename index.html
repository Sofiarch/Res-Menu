<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"  content="width=device-width, initial-scale=1.0"> 
    <title>Menu Categories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0e0e0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container {
            width: 360px;
            max-width: 90vw;
        }

        .card {
            position: relative;
            height: 170px;
            overflow: hidden;
            border-radius: 22px;
            margin-bottom: 25px;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            border: 1.5px solid rgba(8, 149, 237, 0.35);
        }

        .card:hover {
            transform: scale(1.04);
            box-shadow: 0 0 25px rgba(174, 162, 94, 0.3);
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("https://cdn.discordapp.com/attachments/1430621889801486470/1446187031372894452/image.png?ex=6933bae1&is=69326961&hm=cd5d97e88eaf9c831995bd1f273c0ef57805f63cd6c847834092004b106c27c4");
            background-size: cover;
            background-repeat: no-repeat;
            transition: transform 0.4s ease;
            z-index: 1;
        }

        .card:hover::before {
            transform: scale(1.15);
        }

        .beverages::before {
            background-position: center top;
        }

        .desserts::before {
            background-position: center bottom;
        }

        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.65));
            z-index: 2;
        }

        .card h2 {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #ffe9a3;
            z-index: 3;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 10px black;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card beverages">
            <h2>BEVRAGES</h2>
        </div>

        <div class="card desserts">
            <h2>DESSERTS AND FRUITS</h2>
        </div>
    </div>
</body>
</html>
